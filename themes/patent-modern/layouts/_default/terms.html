{{ define "main" }}

<section class="py-12 sm:py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-10">
      <h1 class="text-3xl font-serif font-bold text-gray-900 mb-2">{{ .Title }}</h1>
    </div>

    <div class="flex flex-wrap gap-3">
      {{ range .Pages }}
      <a href="{{ .Permalink }}"
         class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-lg
                hover:border-patent-blue-300 hover:bg-patent-blue-50 transition-all text-sm">
        <span class="text-gray-700">{{ .Title }}</span>
        <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{{ len .Pages }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
