<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" class="scroll-smooth">
<head>
  {{ partial "head" . }}
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-800 bg-white antialiased">
  {{ partial "header" . }}

  <main class="flex-1" id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer" . }}

  {{ block "scripts" . }}{{ end }}
</body>
</html>
