<div class="faq-item" x-data="{ open: false }">
  <button class="faq-question" @click="open = !open" :aria-expanded="open">
    <span>{{ .Get "question" }}</span>
    <svg class="w-5 h-5 text-gray-400 transition-transform duration-200" :class="open && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
  <div class="faq-answer" x-show="open" x-transition>
    {{ with .Get "answer" }}{{ . | markdownify }}{{ else }}{{ .Inner | markdownify }}{{ end }}
  </div>
</div>
