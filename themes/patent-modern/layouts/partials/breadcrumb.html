{{ if not .IsHome }}
<nav class="breadcrumb max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="パンくずナビ">
  <a href="/">ホーム</a>
  <span class="breadcrumb-separator" aria-hidden="true">
    <svg class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </span>

  {{ if .Parent }}
    {{ $sectionTitle := "" }}
    {{ with index .Site.Params.sections .Section }}
      {{ $sectionTitle = .title }}
    {{ end }}
    <a href="{{ .Parent.RelPermalink }}">{{ if $sectionTitle }}{{ $sectionTitle }}{{ else }}{{ .Parent.Title }}{{ end }}</a>
    <span class="breadcrumb-separator" aria-hidden="true">
      <svg class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </span>
  {{ end }}

  <span class="text-gray-800 font-medium" aria-current="page">{{ .Title | truncate 40 }}</span>
</nav>

<!-- BreadcrumbList Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "ホーム",
      "item": "{{ .Site.BaseURL }}"
    }{{ if .Parent }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ with index .Site.Params.sections .Section }}{{ .title }}{{ else }}{{ $.Parent.Title }}{{ end }}",
      "item": "{{ .Parent.Permalink }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}"
    }{{ else }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}"
    }{{ end }}
  ]
}
</script>
{{ end }}
