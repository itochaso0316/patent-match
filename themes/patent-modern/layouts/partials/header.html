<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 sm:h-18">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-3 group">
        <div class="w-9 h-9 bg-patent-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <div>
          <span class="text-lg font-bold text-patent-blue-700 group-hover:text-patent-blue-500 transition-colors">PatentMatch</span>
          <span class="text-xs text-gray-400 block -mt-0.5 hidden sm:block">.jp</span>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center gap-1">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"
           class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-patent-blue-600 hover:bg-patent-blue-50 rounded-lg transition-all duration-200
                  {{ if $.IsMenuCurrent "main" . }}text-patent-blue-600 bg-patent-blue-50{{ end }}">
          {{ .Name }}
        </a>
        {{ end }}
      </nav>

      <!-- Mobile Menu Button -->
      <button id="mobile-menu-toggle"
              class="lg:hidden p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
              aria-label="メニューを開く"
              aria-expanded="false">
        <svg class="w-6 h-6 menu-open" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg class="w-6 h-6 menu-close hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation -->
  <div id="mobile-menu" class="hidden lg:hidden border-t border-gray-100 bg-white">
    <nav class="max-w-7xl mx-auto px-4 py-4 space-y-1">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"
         class="block px-4 py-3 text-base font-medium text-gray-700 hover:text-patent-blue-600 hover:bg-patent-blue-50 rounded-lg transition-colors
                {{ if $.IsMenuCurrent "main" . }}text-patent-blue-600 bg-patent-blue-50{{ end }}">
        {{ .Name }}
      </a>
      {{ end }}
    </nav>
  </div>
</header>

<script>
  document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
    const menu = document.getElementById('mobile-menu');
    const openIcon = this.querySelector('.menu-open');
    const closeIcon = this.querySelector('.menu-close');
    const isExpanded = this.getAttribute('aria-expanded') === 'true';

    menu.classList.toggle('hidden');
    openIcon.classList.toggle('hidden');
    closeIcon.classList.toggle('hidden');
    this.setAttribute('aria-expanded', !isExpanded);
  });
</script>
