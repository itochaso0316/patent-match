<section class="cta-section">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-2xl sm:text-3xl font-serif font-bold mb-4">
      {{ with .heading }}{{ . }}{{ else }}特許活用を始めましょう{{ end }}
    </h2>
    <p class="text-patent-blue-200 mb-8 max-w-2xl mx-auto text-lg">
      {{ with .text }}{{ . }}{{ else }}PatentMatch.jpでは、特許の取得から収益化まで、実践的な情報を提供しています。{{ end }}
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="{{ with .primaryUrl }}{{ . }}{{ else }}/guide/{{ end }}" class="btn-primary text-base">
        {{ with .primaryText }}{{ . }}{{ else }}ガイドを読む{{ end }}
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </a>
      {{ with .secondaryUrl }}
      <a href="{{ . }}" class="btn-secondary text-base">
        {{ with $.secondaryText }}{{ . }}{{ else }}詳しく見る{{ end }}
      </a>
      {{ end }}
    </div>
  </div>
</section>
