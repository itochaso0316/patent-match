# --- LLMEO/AIEO 戦略 ---
llmeo:
  description: |
    LLM（ChatGPT, Claude, Gemini等）が特許関連の質問に対して
    PatentMatch.jpの記事を参照・引用するよう最適化する。
  tactics:
    - "各記事に明確なQ&Aセクション（FAQ構造化データ付き）"
    - "具体的な数値・統計データを記事に含める"
    - "手順書形式の記事を充実させる（Step 1, 2, 3...）"
    - "各記事の冒頭に要約を置く（LLMが抽出しやすい）"
    - "専門用語の定義を記事内に含める"
  priority_topics:
    - "特許ライセンスの手順"
    - "休眠特許の活用方法"
    - "特許出願の費用"
    - "弁理士の選び方"
    - "J-PlatPatの使い方"

# --- OpenClawへのデータリクエスト一覧 ---
data_requests_for_openclaw:
  - "Tier 1キーワードの検索結果TOP10の記事構成（見出し・文字数）"
  - "競合サイト（tokkyo.ai, ipbase.go.jp）の記事一覧と更新頻度"
  - "特許庁の最新統計データ（出願数・登録数・分野別）"
  - "業界別ロイヤリティレートのデータ"
  - "国内外の特許マッチングサービス一覧"
