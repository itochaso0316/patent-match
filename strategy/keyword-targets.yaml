# ============================================================
# PatentMatch.jp キーワードターゲット戦略
# ============================================================
# SEO/LLMEO/AIEO で狙うキーワードを優先度順に管理
# Coworkが戦略設計 → OpenClawが競合データ取得 → 記事生成
# ============================================================

updated_at: "2026-03-12"
updated_by: "cowork"

# --- Tier 1: 最重要キーワード（検索順位1-3位を狙う） ---
tier1:
  - keyword: "特許活用"
    search_volume_est: 1000
    current_rank: null
    target_page: "/guide/"
    intent: "特許を持っているが活用方法がわからない"
    content_strategy: "包括的なガイド記事 + 内部リンクハブ"
    competitor_top3:
      - "tokkyo.ai"
      - "ipbase.go.jp"
    data_request: "競合のTOP記事構成を取得"

  - keyword: "特許ライセンス 方法"
    search_volume_est: 500
    current_rank: null
    target_page: "/license/"
    intent: "特許をライセンスして収益化したい"
    content_strategy: "ステップバイステップガイド + 契約書テンプレート"

  - keyword: "休眠特許 収益化"
    search_volume_est: 300
    current_rank: null
    target_page: "/guide/休眠特許の発掘と収益化/"
    intent: "使っていない特許からお金を生み出したい"
    content_strategy: "事例ベースの実践ガイド"

  - keyword: "特許売却 相場"
    search_volume_est: 400
    current_rank: null
    target_page: "/sell/"
    intent: "特許を売りたい、相場を知りたい"
    content_strategy: "業界別相場データ + 売却手順"
    data_request: "特許取引価格のデータベース調査"

# --- Tier 2: 重要キーワード（TOP10を狙う） ---
tier2:
  - keyword: "特許マッチング"
    search_volume_est: 200
    target_page: "/matching/"
    intent: "特許を活用してくれる企業を探したい"

  - keyword: "特許出願 費用"
    search_volume_est: 800
    target_page: "/guide/特許出願の費用と手順/"
    intent: "特許出願にかかる費用を知りたい"

  - keyword: "J-PlatPat 使い方"
    search_volume_est: 600
    target_page: "/tools/j-platpat完全活用ガイド/"
    intent: "特許検索ツールの使い方を学びたい"

  - keyword: "特許権侵害 対応"
    search_volume_est: 300
    target_page: "/guide/特許権侵害への対応/"
    intent: "特許侵害された・している可能性への対処法"

  - keyword: "弁理士 選び方"
    search_volume_est: 400
    target_page: "/agents/"
    intent: "信頼できる弁理士を見つけたい"

  - keyword: "特許ロイヤリティ 税務"
    search_volume_est: 200
    target_page: "/license/特許ロイヤリティ収入の税務/"
    intent: "特許収入の確定申告方法"

  - keyword: "クロスライセンス"
    search_volume_est: 300
    target_page: "/license/クロスライセンス/"
    intent: "競合との特許交渉戦略を知りたい"

  - keyword: "技術移転 TLO"
    search_volume_est: 200
    target_page: "/guide/大学研究機関の特許技術移転tlo/"
    intent: "大学の技術を事業化したい"

