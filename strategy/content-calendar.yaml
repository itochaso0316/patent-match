# --- OpenClawデータ駆動記事（自主発見ベース） ---
openclaw_driven:
  description: |
    OpenClawが自主的に発見したデータに基づく記事。
    data/openclaw/ に新しいファイルが追加されたら、
    Coworkがレビューして記事化を判断する。
  expected_per_month: 2
  triggers:
    - "新しい特許法改正のニュース"
    - "競合サイトの大型コンテンツ追加"
    - "特許出願数の急増・急減トレンド"
    - "政府の新しい知財支援施策"
    - "注目の特許訴訟ニュース"
