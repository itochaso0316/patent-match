# --- 全体方針 ---
strategy:
  mission: "特許活用の実践情報で日本No.1メディアを目指す"
  target_audience:
    primary: "中小企業の経営者・知財担当者"
    secondary: "大学研究者・起業家"
    tertiary: "弁理士・知財コンサルタント"
  content_pillars:
    - id: "fundamentals"
      name: "特許の基礎知識"
      goal: "特許初心者が最初に読むサイトになる"
      target_section: "guide"
    - id: "monetization"
      name: "特許の収益化"
      goal: "休眠特許の活用方法を具体的に示す"
      target_section: "license"
    - id: "market"
      name: "特許市場の動向"
      goal: "最新の特許データで読者の意思決定を支援"
      target_section: "matching"
    - id: "practical"
      name: "実務ノウハウ"
      goal: "すぐに使える手順書・チェックリスト"
      target_section: "tools"

  monthly_target:
    new_articles: 8
    updated_articles: 4
    data_driven_articles: 2  # OpenClawデータ活用記事

