id: "REQ-20260313-005"
status: "completed"
priority: "medium"
requested_by: "cowork"
requested_at: "2026-03-13T10:00:00+09:00"
category: "government"
title: "スタートアップ向け特許費用減免制度の最新情報"
related_article: "スタートアップのための特許出願ガイド：費用を抑えて権利化する方法"
related_calendar_ref: "march_2026 week 2026-03-23"
description: |
  記事「スタートアップのための特許出願ガイド」の作成用。
  特許庁・中小企業庁・INPIT等の最新の減免制度・支援施策を収集する。
  具体的な金額・減免率・申請条件が必要。
targets:
  - url: "https://www.jpo.go.jp/system/process/tesuryo/genmen/genmen20190401/"
    scope: "特許料等の減免制度の詳細（2026年度版）"
    extract: ["eligibility_criteria", "discount_rates_by_category", "application_process", "fee_amounts"]
  - url: "https://www.jpo.go.jp/system/process/tesuryo/"
    scope: "特許料金一覧（出願料・審査請求料・登録料・年金）"
    extract: ["fee_schedule", "payment_methods"]
  - url: "https://ipbase.go.jp/"
    scope: "スタートアップ向け知財支援プログラム一覧"
    extract: ["program_names", "eligibility", "benefits", "application_deadlines"]
  - url: "https://faq.inpit.go.jp/"
    scope: "INPIT知財総合支援窓口の支援メニュー"
    extract: ["consultation_services", "regional_offices"]
  - search_queries:
      - "特許出願 費用 2026年 スタートアップ"
      - "中小企業 特許費用 減免 最新"
    extract: ["latest_policy_changes", "success_stories"]
output_format: "json"
output_path: "data/crawled/startup-patent-cost-guide.json"
deadline: "2026-03-20"
notes: |
  以下の具体的数値が最も重要:
  - 出願料（14,000円 → 減免後の金額）
  - 審査請求料（138,000円＋α → 減免後）
  - 特許登録料（年金）の減免率
  - 2026年度に制度変更があればそれを最優先で取得
  記事のFAQセクションで「実際にいくらかかるか」を明示したい。
