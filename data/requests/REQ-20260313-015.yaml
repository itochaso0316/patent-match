      - effective_date
      - key_changes
      - impact_on_applicants
      - practical_tips

  - id: "ip-policy-trends"
    description: "政府の知財戦略・スタートアップ支援策"
    targets:
      - search: "知財 スタートアップ支援 政府 2026"
      - search: "特許庁 スタートアップ 施策 2025"
